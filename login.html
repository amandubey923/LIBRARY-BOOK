<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Karla',sans-serif;
}

/* BACKGROUND IMAGE */
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url("assets/images/login.jpg") no-repeat center/cover;
}

/* DARK OVERLAY */
body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:0;
}

/* LOGIN BOX */
.container{
  position:relative;
  z-index:2;
  width:350px;
  padding:30px;
  border-radius:15px;
  backdrop-filter:blur(12px);
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* TITLE */
.container h2{
  color:#fff;
  text-align:center;
  margin-bottom:25px;
}

/* INPUT */
.input-group{
  position:relative;
  margin:20px 0;
}

.input-group input{
  width:100%;
  padding:12px;
  border:none;
  outline:none;
  background:transparent;
  border-bottom:2px solid #ccc;
  color:#fff;
}

.input-group label{
  position:absolute;
  left:0;
  top:50%;
  transform:translateY(-50%);
  color:#ccc;
  transition:0.3s;
}

/* FLOAT EFFECT */
.input-group input:focus ~ label,
.input-group input:valid ~ label{
  top:-5px;
  font-size:12px;
  color:#00ffc3;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:25px;
  background:#00ffc3;
  color:#000;
  font-weight:bold;
  cursor:pointer;
  margin-top:15px;
  transition:0.3s;
}

button:hover{
  background:#00cfa0;
}

/* EXTRA */
.options{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:#ccc;
  margin-top:10px;
}

.options a{
  color:#00ffc3;
  text-decoration:none;
}

/* HOVER EFFECT */
.container:hover{
  transform:translateY(-5px);
  transition:0.3s;
}

</style>

</head>

<body>

<div class="container">

<h2>Welcome Back 👋</h2>

<form >

<div class="input-group">
<input type="text" required>
<label>Email</label>
</div>

<div class="input-group">
<input type="password" required>
<label>Password</label>
</div>

<div class="options">
<label><input type="checkbox"> Remember</label>
<a href="#">Forgot?</a>
</div>

<button type="button" onclick="location.href='index.html'">Login</button>

</form>

</div>

</body>
</html>
